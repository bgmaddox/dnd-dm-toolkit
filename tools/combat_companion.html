const CONDITION_EFFECTS = {

const AI_PROMPTS = {
  "Describe This Hit": {
    icon: "⚡",
    subtitle: "Narrate a strike cinematically",
    fields: [
      { key: "damage", label: "Damage dealt", type: "text", placeholder: "14", defaultValue: "14" },
      { key: "hpState", label: "Target HP state", type: "select", options: ["Fresh (75-100%)", "Injured (50-75%)", "Bloodied (25-50%)", "Critical (<25%)"], defaultValue: "Bloodied (25-50%)" },
    ],
    buildPrompt: (vals, combatants, activeIdx) => {
      const active = combatants[activeIdx];
      return `Narrate this D&D hit in 1-2 punchy sentences. ${active.name} hits for ${vals.damage || "14"} damage. Target is ${vals.hpState || "Bloodied (25-50%)"}. Present tense, visceral, no dialogue.`;
    },
    defaultResponse: `The Hobgoblin Captain's longsword bites deep into Thorin's shoulder, grinding against armor. He barely staggers — jaw set, eyes cold. The Captain pulls the blade free with a sharp twist and steps back into a fighting stance, clearly reading the dwarf as the bigger threat.`

    buildPrompt: (vals, combatants, activeIdx) => {
      const active = combatants[activeIdx];
      return `You are advising a D&D 5e Dungeon Master on tactics for the ${active.name}. Context: ${vals.context || "standard combat positioning"}. Give the single best tactical move this monster should make on its turn. 2-3 sentences max. Be specific about action/bonus action/movement.`;

// ─── UTILITY ────────────────────────────────────────────────────────────────

function hpColor(hp, maxHp) {
  const pct = hp / maxHp;
  if (hp === 0) return "#666";
  if (pct > 0.5) return "#5aab6a";
  if (pct > 0.25) return "#c9a84c";
  return "#c44a4a";
}

function hpPct(hp, maxHp) {
  return Math.max(0, Math.min(100, (hp / maxHp) * 100));
}

// ─── LEFT PANEL ─────────────────────────────────────────────────────────────

function CombatantRow({ combatant, isActive, onClick, onHpChange, onInitiativeChange, onDelete, portrait }) {
  const { name, type, hp, maxHp, conditions } = combatant;
  const pct = hpPct(hp, maxHp);
  const color = hpColor(hp, maxHp);
  const [editingHp, setEditingHp] = useState(false);
  const [hpInput, setHpInput] = useState("");
  const [editingInit, setEditingInit] = useState(false);
  const [initInput, setInitInput] = useState("");
  const [hovered, setHovered] = useState(false);

  function startHpEdit(e) {
    e.stopPropagation();
    setHpInput(String(hp));
    setEditingHp(true);
  }

  function commitHpEdit() {
    const val = parseInt(hpInput);
    if (!isNaN(val)) onHpChange(combatant.id, val);
    setEditingHp(false);
  }

  function startInitEdit(e) {
    e.stopPropagation();
    setInitInput(String(combatant.initiative ?? ""));
    setEditingInit(true);
  }

  function commitInitEdit() {
    const val = parseInt(initInput);
    if (!isNaN(val)) onInitiativeChange(combatant.id, val);
    setEditingInit(false);
  }

  return (
    <div
      onClick={onClick}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        position: "relative",
        background: isActive ? "#21283a" : "var(--card)",
        border: `1px solid ${isActive ? "var(--gold)" : "var(--border)"}`,
        borderLeft: `3px solid ${isActive ? "var(--gold)" : "transparent"}`,
        borderRadius: 6,
        padding: "8px 10px",
        cursor: "pointer",
        transition: "all 0.15s ease",
        boxShadow: isActive ? "0 0 16px rgba(201,168,76,0.12)" : "none",
      }}
    >
      {/* Name + badges row */}
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 5, flexWrap: "wrap" }}>
        {/* Avatar */}
        <div style={{
          width: 30, height: 30, borderRadius: "50%", flexShrink: 0,
          border: `1px solid ${isActive ? "var(--gold-dim)" : "var(--border)"}`,
          background: "var(--bg)", overflow: "hidden",
          display: "flex", alignItems: "center", justifyContent: "center",
        }}>
          {portrait ? (
            <img src={portrait} style={{ width: "100%", height: "100%", objectFit: "cover", animation: "portraitFadeIn 0.4s ease" }} />
          ) : (
            <span style={{ fontSize: 14, opacity: 0.4 }}>{type === "PC" ? "⚔" : "☠"}</span>
          )}
        </div>
        <span style={{
          fontFamily: "var(--font-head)",
          fontSize: type === "Monster" ? 13 : 14,
          fontWeight: 600,
          color: isActive ? "var(--gold)" : "var(--text)",
          flex: 1,
          letterSpacing: type === "Monster" ? "0.04em" : "0.01em",
          lineHeight: 1.3,
        }}>
          {name}
        </span>
        <span style={{
          fontSize: 9,
          fontWeight: 600,
          padding: "1px 7px",
          borderRadius: 20,
          background: type === "PC" ? "rgba(74,120,196,0.25)" : "rgba(196,74,74,0.25)",
          border: `1px solid ${type === "PC" ? "var(--blue)" : "var(--red)"}`,
          color: type === "PC" ? "#6a9de8" : "#e06868",
          letterSpacing: "0.04em",
          whiteSpace: "nowrap",
          fontFamily: "var(--font-head)",
        }}>
          {type === "PC" ? "PC" : "MON"}
        </span>
      </div>

      {/* HP bar + initiative */}
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: conditions.length ? 5 : 0 }}>
        <div style={{ flex: 1, height: 5, background: "var(--border)", borderRadius: 3, overflow: "hidden" }}>
          <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 3, transition: "width 0.3s ease" }} />
        </div>
        {editingHp ? (
          <input
            autoFocus
            value={hpInput}
            onChange={e => setHpInput(e.target.value)}
            onBlur={commitHpEdit}
            onKeyDown={e => { if (e.key === "Enter") commitHpEdit(); if (e.key === "Escape") setEditingHp(false); }}
            onClick={e => e.stopPropagation()}
            style={{ width: 52, fontSize: 13, background: "#0d1017", border: "1px solid var(--gold-dim)", borderRadius: 3, color: "var(--text)", padding: "1px 4px", textAlign: "right", outline: "none" }}
          />
        ) : (
          <span
            onClick={startHpEdit}
            title="Click to edit HP"
            style={{ fontSize: 13, color: hp === 0 ? "#666" : "var(--text-dim)", whiteSpace: "nowrap", minWidth: 40, textAlign: "right", cursor: "text" }}
          >
            {hp}/{maxHp}
          </span>
        )}
        {/* Initiative */}
        <div style={{ width: 1, background: "var(--border)", alignSelf: "stretch", flexShrink: 0 }} />
        {editingInit ? (
          <input
            autoFocus
            value={initInput}
            onChange={e => setInitInput(e.target.value)}
            onBlur={commitInitEdit}
            onKeyDown={e => { if (e.key === "Enter") commitInitEdit(); if (e.key === "Escape") setEditingInit(false); }}
            onClick={e => e.stopPropagation()}
            type="number"
            style={{ width: 38, fontSize: 13, background: "#0d1017", border: "1px solid var(--gold-dim)", borderRadius: 3, color: "var(--gold)", padding: "1px 4px", textAlign: "center", outline: "none" }}
          />
        ) : (
          <span
            onClick={startInitEdit}
            title="Click to edit initiative"
            style={{ fontSize: 13, color: "var(--gold-dim)", whiteSpace: "nowrap", minWidth: 20, textAlign: "center", cursor: "text", fontFamily: "var(--font-head)" }}
          >
            {combatant.initiative ?? "—"}
          </span>
        )}
      </div>

      {/* Conditions */}
      {conditions.length > 0 && (
        <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
          {conditions.map(c => {
            const style = CONDITION_COLORS[c] || { bg: "rgba(150,150,150,0.2)", border: "#888", text: "#aaa" };
            return (
              <span key={c} style={{
                fontSize: 9,
                padding: "1px 6px",
                borderRadius: 20,
                background: style.bg,
                border: `1px solid ${style.border}`,
                color: style.text,
                fontFamily: "var(--font-head)",
                letterSpacing: "0.03em",
              }}>
                {c}
              </span>
            );
          })}
        </div>
      )}

      {/* Active turn pulse dot */}
      {isActive && (
        <div style={{
          position: "absolute", top: 8, right: 8,
          width: 7, height: 7, borderRadius: "50%",
          background: "var(--gold)", boxShadow: "0 0 6px var(--gold)",
          animation: "pulse 1.6s ease-in-out infinite",
        }} />
      )}

      {/* Delete button — appears on hover, bottom-right */}
      {hovered && (
        <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 5 }}>
          <button
            onClick={e => { e.stopPropagation(); onDelete(combatant.id); }}
            title="Remove from combat"
            style={{
              background: "rgba(196,74,74,0.12)", border: "1px solid rgba(196,74,74,0.35)",
              borderRadius: 4, color: "#e06868", cursor: "pointer",
              fontSize: 10, fontFamily: "var(--font-head)", letterSpacing: "0.06em",
              padding: "2px 8px", lineHeight: 1.4,
            }}
          >✕ REMOVE</button>
        </div>
      )}
    </div>
  );
}

function LeftPanel({ combatants, setCombatants, activeIdx, setActiveIdx, tweaks, onOpenAdd, onOpenInitiatives, portraits, encName, setEncName, encNote, setEncNote, roundNumber, setRoundNumber, onOpenSessions }) {
  const [editingEnc, setEditingEnc] = useState(null); // "name" | "note" | null

  function nextTurn() {
    setActiveIdx(prev => {
      const next = (prev + 1) % combatants.length;
      if (next === 0) setRoundNumber(r => r + 1);
      return next;
    });
  }

  function hpChange(id, newHp) {
    setCombatants(prev => prev.map(c => c.id === id ? { ...c, hp: Math.max(0, Math.min(c.maxHp, newHp)) } : c));
  }

  function initiativeChange(id, newInit) {
    setCombatants(prev => {
      const activeId = prev[activeIdx]?.id;
      const updated = prev.map(c => c.id === id ? { ...c, initiative: newInit } : c);
      const sorted = [...updated].sort((a, b) => b.initiative - a.initiative);
      const newActiveIdx = sorted.findIndex(c => c.id === activeId);
      if (newActiveIdx !== -1) setActiveIdx(newActiveIdx);
      return sorted;
    });
  }

  function deleteCombatant(id) {
    setCombatants(prev => {
      const next = prev.filter(c => c.id !== id);
      setActiveIdx(ai => Math.min(ai, Math.max(0, next.length - 1)));
      return next;
    });
  }

  return (
    <div style={{
      width: tweaks.leftPanelWidth || 240,
      minWidth: tweaks.leftPanelWidth || 240,
      borderRight: "1px solid var(--border)",
      display: "flex",
      flexDirection: "column",
      overflow: "hidden",
    }}>
      {/* Header */}
      <div style={{ padding: "14px 14px 10px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
          <div style={{ fontFamily: "var(--font-head)", fontSize: 11, color: "var(--gold)", letterSpacing: "0.1em" }}>
            ACTIVE ENCOUNTER
          </div>
          <button
            onClick={onOpenSessions}
            title="Save / Load session"
            style={{ background: "none", border: "none", cursor: "pointer", padding: "1px 3px", fontSize: 14, opacity: 0.55, transition: "opacity 0.15s" }}
            onMouseEnter={e => e.currentTarget.style.opacity = "1"}
            onMouseLeave={e => e.currentTarget.style.opacity = "0.55"}
          >💾</button>
        </div>
        {editingEnc === "name" ? (
          <input
            autoFocus
            value={encName}
            onChange={e => setEncName(e.target.value)}
            onBlur={() => setEditingEnc(null)}
            onKeyDown={e => { if (e.key === "Enter" || e.key === "Escape") setEditingEnc(null); }}
            style={{ ...inputStyle, width: "100%", fontSize: 13, fontWeight: 600, marginBottom: 3 }}
          />
        ) : (
          <div
            onClick={() => setEditingEnc("name")}
            title="Click to edit"
            style={{ fontSize: 13, fontWeight: 600, color: "var(--text)", lineHeight: 1.3, marginBottom: 3, cursor: "text" }}
          >
            {encName}
          </div>
        )}
        {editingEnc === "note" ? (
          <input
            autoFocus
            value={encNote}
            onChange={e => setEncNote(e.target.value)}
            onBlur={() => setEditingEnc(null)}
            onKeyDown={e => { if (e.key === "Enter" || e.key === "Escape") setEditingEnc(null); }}
            style={{ ...inputStyle, width: "100%", fontSize: 11 }}
          />
        ) : (
          <div
            onClick={() => setEditingEnc("note")}
            title="Click to edit"
            style={{ fontSize: 11, color: "var(--text-dim)", fontStyle: "italic", cursor: "text" }}
          >
            {encNote}
          </div>
        )}
      </div>

      {/* Round counter */}
      <div style={{ padding: "6px 14px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ fontSize: 11, color: "var(--text-dim)", fontFamily: "var(--font-head)", letterSpacing: "0.05em" }}>ROUND</span>
        <span style={{ fontSize: 13, color: "var(--gold)", fontFamily: "var(--font-head)", fontWeight: 600 }}>{roundNumber}</span>
        <span style={{ fontSize: 10, color: "var(--text-faint)" }}>Initiative Order</span>
      </div>

      {/* Combatant list */}
      <div style={{ flex: 1, overflowY: "auto", padding: "10px 10px 0" }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {combatants.map((c, i) => (
            <CombatantRow
              key={c.id}
              combatant={c}
              isActive={i === activeIdx}
              onClick={() => setActiveIdx(i)}
              onHpChange={hpChange}
              onInitiativeChange={initiativeChange}
              onDelete={deleteCombatant}
              portrait={portraits && portraits[c.id]}
            />
          ))}
        </div>
      </div>

      {/* Next Turn button */}
      <div style={{ padding: "12px 10px 8px" }}>
        <button
          onClick={nextTurn}
          style={{
            width: "100%",
            padding: "11px 0",
            background: "linear-gradient(135deg, #c9a84c 0%, #a8873a 100%)",
            border: "none",
            borderRadius: 6,
            color: "#111318",
            fontFamily: "var(--font-head)",
            fontSize: 12,
            fontWeight: 700,
            letterSpacing: "0.12em",
            cursor: "pointer",
            transition: "opacity 0.15s",
          }}
          onMouseEnter={e => e.currentTarget.style.opacity = "0.85"}
          onMouseLeave={e => e.currentTarget.style.opacity = "1"}
        >
          NEXT TURN →
        </button>
      </div>

      {/* Add / Remove combatant */}
      <div style={{ padding: "0 10px 6px", display: "flex", gap: 6 }}>
        <button
          onClick={() => onOpenAdd()}
          style={{
            flex: 1, background: "none", border: "none",
            color: "var(--text-faint)", fontSize: 11,
            fontFamily: "var(--font-head)", letterSpacing: "0.08em",
            cursor: "pointer", textAlign: "center",
            padding: "4px 0", transition: "color 0.15s",
          }}
          onMouseEnter={e => e.currentTarget.style.color = "var(--gold)"}
          onMouseLeave={e => e.currentTarget.style.color = "var(--text-faint)"}
        >
          + ADD
        </button>
        <div style={{ width: 1, background: "var(--border)", margin: "4px 0" }} />
        <button
          onClick={() => combatants.length > 0 && deleteCombatant(combatants[activeIdx].id)}
          style={{
            flex: 1, background: "none", border: "none",
            color: "var(--text-faint)", fontSize: 11,
            fontFamily: "var(--font-head)", letterSpacing: "0.08em",
            cursor: "pointer", textAlign: "center",
            padding: "4px 0", transition: "color 0.15s",
          }}
          onMouseEnter={e => e.currentTarget.style.color = "#e06868"}
          onMouseLeave={e => e.currentTarget.style.color = "var(--text-faint)"}
        >
          − REMOVE
        </button>
      </div>

      {/* Set Initiatives */}
      <div style={{ padding: "0 10px 14px" }}>
        <button
          onClick={onOpenInitiatives}
          style={{
            width: "100%", background: "none",
            border: "1px solid var(--border)", borderRadius: 5,
            color: "var(--text-faint)", fontSize: 11,
            fontFamily: "var(--font-head)", letterSpacing: "0.08em",
            cursor: "pointer", textAlign: "center",
            padding: "5px 0", transition: "all 0.15s",
          }}
          onMouseEnter={e => { e.currentTarget.style.color = "var(--gold)"; e.currentTarget.style.borderColor = "var(--gold-dim)"; }}
          onMouseLeave={e => { e.currentTarget.style.color = "var(--text-faint)"; e.currentTarget.style.borderColor = "var(--border)"; }}
        >
          ⚡ SET INITIATIVES
        </button>
      </div>
    </div>
  );
}

// Dropdown rendered into document.body via portal so overflow:hidden on panels never clips it
function FloatingDropdown({ inputRef, show, children, maxHeight = 240 }) {
  const [pos, setPos] = React.useState({ top: 0, left: 0, width: 0 });
  React.useLayoutEffect(() => {
    if (!show || !inputRef.current) return;
    const r = inputRef.current.getBoundingClientRect();
    setPos({ top: r.bottom, left: r.left, width: r.width });
  }, [show]);
  if (!show) return null;
  return ReactDOM.createPortal(
    <div style={{
      position: "fixed", top: pos.top, left: pos.left, width: pos.width,
      zIndex: 9999, background: "var(--card)", border: "1px solid var(--border)",
      borderTop: "none", borderRadius: "0 0 6px 6px",
      maxHeight, overflowY: "auto", boxShadow: "0 6px 20px rgba(0,0,0,0.6)",
    }}>
      {children}
    </div>,
    document.body
  );
}

const CR_XP = {"0":10,"1/8":25,"1/4":50,"1/2":100,"1":200,"2":450,"3":700,"4":1100,"5":1800,"6":2300,"7":2900,"8":3900,"9":5000,"10":5900,"11":7200,"12":8400,"13":10000,"14":11500,"15":13000,"16":15000,"17":18000,"18":20000,"19":22000,"20":25000,"21":33000,"22":41000,"23":50000,"24":62000};
function modStr(s) { const m = Math.floor((s - 10) / 2); return (m >= 0 ? "+" : "") + m; }

function normalizeMonster(m) {
  if (!m) return HOBGOBLIN_STAT_BLOCK;
  if (m.stats) return m; // already in local format
  const crStr = m.challenge_rating != null ? String(m.challenge_rating) : (m.cr != null ? String(m.cr) : "?");
  const speedStr = m.speed
    ? Object.entries(m.speed).map(([k,v]) => k === "walk" ? v + " ft." : k + " " + v + " ft.").join(", ")
    : "—";
  const saves = [["strength_save","Str"],["dexterity_save","Dex"],["constitution_save","Con"],["intelligence_save","Int"],["wisdom_save","Wis"],["charisma_save","Cha"]];
  const savingThrows = saves.filter(([k]) => m[k] != null).map(([k,l]) => `${l} ${m[k]>=0?"+":""}${m[k]}`).join(", ") || "—";
  const skillsStr = m.skills && Object.keys(m.skills).length
    ? Object.entries(m.skills).map(([k,v]) => `${k[0].toUpperCase()+k.slice(1)} ${v>=0?"+":""}${v}`).join(", ")
    : "—";
  return {
    name: m.name,
    size: m.size,
    type: m.subtype ? `${m.type} (${m.subtype})` : m.type,
    alignment: m.alignment,
    cr: crStr,
    xp: String(CR_XP[crStr] || "?"),
    ac: m.armor_desc ? `${m.armor_class} (${m.armor_desc})` : String(m.armor_class || "—"),
    hp: m.hit_dice ? `${m.hit_points} (${m.hit_dice})` : String(m.hit_points || "—"),
    speed: speedStr,
    stats: {
      STR: [m.strength, modStr(m.strength)],
      DEX: [m.dexterity, modStr(m.dexterity)],
      CON: [m.constitution, modStr(m.constitution)],
      INT: [m.intelligence, modStr(m.intelligence)],
      WIS: [m.wisdom, modStr(m.wisdom)],
      CHA: [m.charisma, modStr(m.charisma)],
    },
    savingThrows,
    skills: skillsStr,
    senses: m.senses || "—",
    languages: m.languages || "—",
    traits: (m.special_abilities || []).map(a => ({ name: a.name, desc: a.desc })),
    actions: (m.actions || []).map(a => ({ name: a.name, desc: a.desc })),
    reactions: (m.reactions || []).map(r => ({ name: r.name, desc: r.desc })),
    tactics: m.tactics || [],
    _raw: m,
  };
}

function CenterPanel({ combatants, activeIdx, setCombatants, allMonsters, onOpenAdd, portraits }) {
  const [search, setSearch] = useState("");
  const [showResults, setShowResults] = useState(false);
  const [activeTab, setActiveTab] = useState("statblock");
  const [currentMonster, setCurrentMonster] = useState(HOBGOBLIN_STAT_BLOCK);
  const [hpDelta, setHpDelta] = useState("");
  const [tacticsLoading, setTacticsLoading] = useState(false);
  const [tacticsError, setTacticsError] = useState("");
  const searchInputRef = useRef(null);
  const sb = currentMonster;

  const activeCombatant = combatants[activeIdx] || null;

  // Sync center panel when the active combatant selection changes
  const prevActiveIdxRef = useRef(activeIdx);
  useEffect(() => {
    if (!combatants.length || activeIdx >= combatants.length) return;
    const idxChanged = prevActiveIdxRef.current !== activeIdx;
    prevActiveIdxRef.current = activeIdx;

    const active = combatants[activeIdx];
    if (active.type === "PC") {
      if (idxChanged) setActiveTab("statblock");
      return;
    }
    if (!allMonsters.length) return;
    const nameLower = active.name.toLowerCase();
    const origLower = active._monsterName ? active._monsterName.toLowerCase() : null;
    const found =
      (origLower && allMonsters.find(m => m.name.toLowerCase() === origLower)) ||
      allMonsters.find(m => m.name.toLowerCase() === nameLower) ||
      allMonsters.find(m => nameLower.startsWith(m.name.toLowerCase())) ||
      allMonsters.find(m => m.name.toLowerCase().startsWith(nameLower));
    if (found && found.name !== currentMonster.name) {
      const normalized = normalizeMonster(found);
      setCurrentMonster(normalized);
      setSearch(found.name);
      setActiveTab("statblock");
      setTacticsError("");
      loadOrGenerateTactics(normalized);
    }
  }, [activeIdx, combatants, allMonsters]);

  const searchResults = search.trim().length >= 2 && allMonsters.length > 0
    ? allMonsters.filter(m => m.name.toLowerCase().includes(search.toLowerCase())).slice(0, 8)
    : [];

  function monsterSlug(name) {
    return name.toLowerCase().replace(/[^a-z0-9]+/g, "-");
  }

  function applyTacticsData(tacticsData) {
    setCurrentMonster(prev => ({
      ...prev,
      tactics: tacticsData.tactics || [],
      fleeThreshold: tacticsData.flee_threshold || "",
    }));
  }

  async function loadOrGenerateTactics(monster) {
    const slug = monsterSlug(monster.name);
    const statSummary = `AC ${monster.ac}, HP ${monster.hp}, Speed ${monster.speed}. Saves: ${monster.savingThrows}. Skills: ${monster.skills}. Traits: ${(monster.traits||[]).map(t=>t.name).join(", ")}. Actions: ${(monster.actions||[]).map(a=>a.name).join(", ")}.`;
    // Check cache first — free
    try {
      const cached = await fetch(`/api/tactics/${slug}`).then(r => r.json());
      if (cached.tactics) { applyTacticsData(cached.tactics); return; }
    } catch(e) {}
    // Not cached — auto-generate via Gemini (free tier)
    setTacticsLoading(true);
    try {
      const res = await fetch(`/api/tactics/${slug}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: monster.name, stat_block: statSummary }),
      });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      applyTacticsData(data.tactics);
    } catch(e) {
      setTacticsError("Auto-generation failed. Use the Regenerate button to retry.");
    }
    setTacticsLoading(false);
  }

  function selectMonster(m) {
    const normalized = normalizeMonster(m);
    setCurrentMonster(normalized);
    setSearch(m.name);
    setShowResults(false);
    setActiveTab("statblock");
    setTacticsError("");
    loadOrGenerateTactics(normalized);
  }

  async function generateTactics() {
    setTacticsLoading(true);
    setTacticsError("");
    const slug = monsterSlug(sb.name);
    const statSummary = `AC ${sb.ac}, HP ${sb.hp}, Speed ${sb.speed}. Saves: ${sb.savingThrows}. Skills: ${sb.skills}. Traits: ${(sb.traits||[]).map(t=>t.name).join(", ")}. Actions: ${(sb.actions||[]).map(a=>a.name).join(", ")}.`;
    try {
      const res = await fetch(`/api/tactics/${slug}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: sb.name, stat_block: statSummary }),
      });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      applyTacticsData(data.tactics);
    } catch(e) {
      setTacticsError("Failed to generate tactics. Check connection.");
    }
    setTacticsLoading(false);
  }

  function applyDamage() {
    const n = parseInt(hpDelta); if (isNaN(n) || !activeCombatant) return;
    setCombatants(prev => prev.map(c => c.id === activeCombatant.id
      ? { ...c, hp: Math.max(0, Math.min(c.maxHp, c.hp - n)) } : c));
    setHpDelta("");
  }
  function applyHeal() {
    const n = parseInt(hpDelta); if (isNaN(n) || !activeCombatant) return;
    setCombatants(prev => prev.map(c => c.id === activeCombatant.id
      ? { ...c, hp: Math.max(0, Math.min(c.maxHp, c.hp + n)) } : c));
    setHpDelta("");
  }
  function toggleCondition(condName) {
    if (!activeCombatant) return;
    setCombatants(prev => prev.map(c => {
      if (c.id !== activeCombatant.id) return c;
      const has = (c.conditions || []).includes(condName);
      return { ...c, conditions: has ? c.conditions.filter(x => x !== condName) : [...(c.conditions || []), condName] };
    }));
  }

  const isPC = activeCombatant?.type === "PC";
  const tabs = isPC
    ? [{ id: "statblock", label: "STAT BLOCK" }, { id: "hp", label: "HP" }]
    : [{ id: "statblock", label: "STAT BLOCK" }, { id: "hp", label: "HP" }, { id: "tactics", label: "TACTICS" }];

  return (
    <div style={{
      flex: 1,
      borderRight: "1px solid var(--border)",
      display: "flex",
      flexDirection: "column",
      minHeight: 0,
    }}>
      {/* Search bar — overflow visible so dropdown isn't clipped */}
      <div style={{ padding: "12px 16px", borderBottom: "1px solid var(--border)", overflow: "visible", position: "relative", zIndex: 20 }}>
        <div style={{ position: "relative" }}>
          <span style={{
            position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)",
            color: "var(--text-faint)", fontSize: 17, pointerEvents: "none",
          }}>⌕</span>
          <input
            ref={searchInputRef}
            value={search}
            onChange={e => { setSearch(e.target.value); setShowResults(true); }}
            onFocus={() => setShowResults(true)}
            onBlur={() => setTimeout(() => setShowResults(false), 150)}
            placeholder="Search monster..."
            style={{ ...inputStyle, paddingLeft: 30, width: "100%", fontSize: 16 }}
          />
          <FloatingDropdown inputRef={searchInputRef} show={showResults && searchResults.length > 0}>
            {searchResults.map((m, i) => (
              <div key={i} onMouseDown={() => selectMonster(m)} style={{
                padding: "9px 12px", cursor: "pointer",
                display: "flex", justifyContent: "space-between",
                borderBottom: "1px solid var(--border)", fontSize: 16,
              }}
                onMouseEnter={e => e.currentTarget.style.background = "var(--card-hover)"}
                onMouseLeave={e => e.currentTarget.style.background = "transparent"}
              >
                <span style={{ color: "var(--text)" }}>{m.name}</span>
                <span style={{ color: "var(--gold-dim)", fontFamily: "var(--font-head)", fontSize: 14 }}>CR {m.cr || m.challenge_rating}</span>
              </div>
            ))}
          </FloatingDropdown>
        </div>
      </div>

      {/* Scroll area */}
      <div style={{ flex: 1, overflowY: "auto", padding: "16px 16px 24px" }}>

        {/* Header — PC or Monster */}
        {activeCombatant && activeCombatant.type === "PC" ? (
          <div style={{ display: "flex", gap: 16, alignItems: "center", marginBottom: 16, padding: "12px 14px", background: "rgba(74,120,196,0.07)", border: "1px solid rgba(74,120,196,0.2)", borderRadius: 8 }}>
            <div style={{
              width: 72, height: 72, flexShrink: 0, borderRadius: 8,
              border: "1px solid var(--border-bright)", background: "var(--bg)",
              overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center",
            }}>
              {portraits && portraits[activeCombatant.id] ? (
                <img src={portraits[activeCombatant.id]} style={{ width: "100%", height: "100%", objectFit: "cover", animation: "portraitFadeIn 0.4s ease" }} />
              ) : (
                <span style={{ fontSize: 28, opacity: 0.25 }}>⚔</span>
              )}
            </div>
            <div>
              <h2 style={{ fontFamily: "var(--font-head)", fontSize: 26, fontWeight: 700, color: "var(--text)", letterSpacing: "0.02em", lineHeight: 1.2, marginBottom: 4 }}>
                {activeCombatant.name}
              </h2>
              <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                <span style={{ fontSize: 13, padding: "2px 9px", borderRadius: 20, background: "rgba(74,120,196,0.25)", border: "1px solid var(--blue)", color: "#6a9de8", fontFamily: "var(--font-head)", letterSpacing: "0.04em" }}>PC</span>
                <span style={{ fontSize: 15, color: "var(--text-dim)" }}>
                  {activeCombatant.hp}/{activeCombatant.maxHp} HP
                </span>
              </div>
              {activeCombatant.pcData && (
                <div style={{ fontSize: 15, color: "var(--text-faint)", fontStyle: "italic", marginTop: 4 }}>
                  {[activeCombatant.pcData.race, activeCombatant.pcData.charClass].filter(Boolean).join(" · ")}
                  {activeCombatant.pcData.level ? ` · Level ${activeCombatant.pcData.level}` : ""}
                </div>
              )}
            </div>
          </div>
        ) : (
          <>
            <div style={{ marginBottom: 10 }}>
              <h2 style={{
                fontFamily: "var(--font-head)",
                fontSize: 28, fontWeight: 700,
                color: "var(--gold)",
                letterSpacing: "0.02em", lineHeight: 1.2, marginBottom: 4,
              }}>
                {sb.name}
              </h2>
              <div style={{ color: "var(--text-dim)", fontSize: 18, fontStyle: "italic", marginBottom: 8 }}>
                {sb.size} {sb.type}, {sb.alignment}
              </div>
              <button
                onClick={() => onOpenAdd(currentMonster)}
                style={{
                  padding: "6px 16px",
                  background: "rgba(201,168,76,0.1)", border: "1px solid rgba(201,168,76,0.3)",
                  borderRadius: 5, color: "var(--gold)", fontFamily: "var(--font-head)",
                  fontSize: 14, letterSpacing: "0.08em", cursor: "pointer",
                  transition: "background 0.15s",
                }}
                onMouseEnter={e => e.currentTarget.style.background = "rgba(201,168,76,0.2)"}
                onMouseLeave={e => e.currentTarget.style.background = "rgba(201,168,76,0.1)"}
              >
                + ADD TO COMBAT
              </button>
            </div>
            <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap" }}>
              {[
                { label: sb.size + " Humanoid", color: "#4a78c4" },
                { label: "CR " + sb.cr, color: "var(--gold)" },
                { label: sb.xp + " XP", color: "var(--text-dim)" },
              ].map(t => (
                <span key={t.label} style={{
                  fontSize: 15, padding: "3px 10px",
                  border: `1px solid ${t.color}`, borderRadius: 20,
                  color: t.color, fontFamily: "var(--font-head)",
                  letterSpacing: "0.04em", background: "rgba(0,0,0,0.3)",
                }}>{t.label}</span>
              ))}
            </div>
          </>
        )}

        {/* Tabs */}
        <div style={{
          display: "flex", gap: 0,
          borderBottom: "1px solid var(--border)",
          marginBottom: 16,
        }}>
          {tabs.map(tab => {
            const isActive = activeTab === tab.id;
            return (
              <button
                key={tab.id}
                onClick={() => setActiveTab(tab.id)}
                style={{
                  background: "none", border: "none",
                  padding: "8px 16px 9px",
                  fontFamily: "var(--font-head)",
                  fontSize: 14,
                  fontWeight: 600,
                  letterSpacing: "0.1em",
                  color: isActive ? "var(--gold)" : "var(--text-faint)",
                  cursor: "pointer",
                  position: "relative",
                  transition: "color 0.15s",
                  borderBottom: isActive ? "2px solid var(--gold)" : "2px solid transparent",
                  marginBottom: -1,
                }}
                onMouseEnter={e => { if (!isActive) e.currentTarget.style.color = "var(--text-dim)"; }}
                onMouseLeave={e => { if (!isActive) e.currentTarget.style.color = "var(--text-faint)"; }}
              >
                {tab.label}
              </button>
            );
          })}
        </div>

        {/* Tab: STAT BLOCK — PC */}
        {activeTab === "statblock" && isPC && (() => {
          const pd = activeCombatant?.pcData;
          return (
            <div style={{ paddingBottom: 20 }}>
              {pd?.stats ? (
                <>
                  {/* Class / Race / Level row */}
                  <div style={{
                    display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap",
                    padding: "10px 12px",
                    background: "rgba(74,120,196,0.07)",
                    border: "1px solid rgba(74,120,196,0.2)",
                    borderRadius: 6,
                  }}>
                    {[["Class", pd.charClass], ["Race", pd.race], ["Level", pd.level]].filter(([,v]) => v != null).map(([k, v]) => (
                      <div key={k} style={{ display: "flex", gap: 5, alignItems: "baseline" }}>
                        <span style={{ fontFamily: "var(--font-head)", fontSize: 15, color: "var(--blue)", letterSpacing: "0.08em" }}>{k}</span>
                        <span style={{ fontSize: 21, color: "var(--text)" }}>{v}</span>
                      </div>
                    ))}
                  </div>
                  {/* Ability scores */}
                  <div style={{ marginBottom: 14 }}>
                    <AbilityGrid stats={pd.stats} />
                  </div>
                  {/* Proficiencies */}
                  <div style={{
                    background: "var(--card)", border: "1px solid var(--border)",
                    borderRadius: 6, padding: "10px 12px", marginBottom: 14, fontSize: 19,
                  }}>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6px 12px" }}>
                      {[
                        pd.savingThrows && ["Saving Throws", pd.savingThrows],
                        pd.skills       && ["Skills", pd.skills],
                        pd.languages    && ["Languages", pd.languages],
                        pd.passivePerception != null && ["Passive Perception", String(pd.passivePerception)],
                        pd.profBonus    && ["Proficiency Bonus", pd.profBonus],
                      ].filter(Boolean).map(([k, v]) => (
                        <React.Fragment key={k}>
                          <span style={{ color: "var(--blue)", fontFamily: "var(--font-head)", fontSize: 16, letterSpacing: "0.06em", alignSelf: "start", paddingTop: 2 }}>{k}</span>
                          <span style={{ color: "var(--text-dim)" }}>{v}</span>
                        </React.Fragment>
                      ))}
                    </div>
                  </div>
                </>
              ) : (
                <div style={{ color: "var(--text-faint)", fontSize: 15, fontStyle: "italic", padding: "24px 0", textAlign: "center", lineHeight: 1.8 }}>
                  No detailed stats available.<br />
                  <span style={{ fontSize: 13 }}>Add this PC from the Players tab for a full stat block.</span>
                </div>
              )}
            </div>
          );
        })()}

        {/* Tab: STAT BLOCK — Monster */}
        {activeTab === "statblock" && !isPC && (
          <div style={{ paddingBottom: 20 }}>
            {/* Quick stats */}
            <div style={{
              display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap",
              padding: "10px 12px",
              background: "rgba(201,168,76,0.07)",
              border: "1px solid rgba(201,168,76,0.2)",
              borderRadius: 6,
            }}>
              {[["AC", sb.ac], ["HP", sb.hp], ["Speed", sb.speed]].map(([k, v]) => (
                <div key={k} style={{ display: "flex", gap: 5, alignItems: "baseline" }}>
                  <span style={{ fontFamily: "var(--font-head)", fontSize: 15, color: "var(--gold)", letterSpacing: "0.08em" }}>{k}</span>
                  <span style={{ fontSize: 21, color: "var(--text)" }}>{v}</span>
                </div>
              ))}
            </div>

            {/* Ability scores */}
            <div style={{ marginBottom: 14 }}>
              <AbilityGrid stats={sb.stats} />
            </div>

            {/* Proficiencies block */}
            <div style={{
              background: "var(--card)", border: "1px solid var(--border)",
              borderRadius: 6, padding: "10px 12px", marginBottom: 14, fontSize: 19,
            }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6px 12px" }}>
                {[
                  ["Saving Throws", sb.savingThrows],
                  ["Skills", sb.skills],
                  ["Senses", sb.senses],
                  ["Languages", sb.languages],
                ].map(([k, v]) => (
                  <React.Fragment key={k}>
                    <span style={{ color: "var(--gold)", fontFamily: "var(--font-head)", fontSize: 16, letterSpacing: "0.06em", alignSelf: "start", paddingTop: 2 }}>{k}</span>
                    <span style={{ color: "var(--text-dim)" }}>{v}</span>
                  </React.Fragment>
                ))}
              </div>
            </div>

            {(sb.traits||[]).length > 0 && <StatSection title="TRAITS">
              {(sb.traits||[]).map(t => <ActionEntry key={t.name} action={t} />)}
            </StatSection>}
            {(sb.actions||[]).length > 0 && <StatSection title="ACTIONS">
              {(sb.actions||[]).map(a => <ActionEntry key={a.name} action={a} />)}
            </StatSection>}
            {(sb.reactions||[]).length > 0 && <StatSection title="REACTIONS">
              {(sb.reactions||[]).map(r => <ActionEntry key={r.name} action={r} />)}
            </StatSection>}
          </div>
        )}

        {/* Tab: HP */}
        {activeTab === "hp" && activeCombatant && (
          <div style={{ paddingBottom: 24 }}>
            {/* Portrait + HP display */}
            <div style={{ display: "flex", gap: 16, alignItems: "flex-start", marginBottom: 20 }}>
              {/* Portrait */}
              <div style={{
                width: 90, height: 90, flexShrink: 0, borderRadius: 6,
                border: `1px solid ${portraits && portraits[activeCombatant.id] ? "var(--border-bright)" : "var(--border)"}`,
                background: "var(--bg)", overflow: "hidden",
                display: "flex", alignItems: "center", justifyContent: "center",
              }}>
                {portraits && portraits[activeCombatant.id] ? (
                  <img src={portraits[activeCombatant.id]} style={{ width: "100%", height: "100%", objectFit: "cover", animation: "portraitFadeIn 0.4s ease" }} />
                ) : (
                  <span style={{ fontSize: 30, opacity: 0.2 }}>{activeCombatant.type === "PC" ? "⚔" : "☠"}</span>
                )}
              </div>
              {/* Name + HP */}
              <div style={{ flex: 1, textAlign: "center" }}>
                <div style={{ fontFamily: "var(--font-head)", fontSize: 14, color: "var(--gold)", letterSpacing: "0.1em", marginBottom: 6 }}>
                  {activeCombatant.name.toUpperCase()}
                </div>
                <div style={{ display: "flex", alignItems: "baseline", justifyContent: "center", gap: 6 }}>
                  <span style={{ fontFamily: "var(--font-head)", fontSize: 50, fontWeight: 700, color: activeCombatant.hp === 0 ? "var(--red)" : activeCombatant.hp < activeCombatant.maxHp * 0.25 ? "#e06868" : "var(--text)", lineHeight: 1 }}>
                    {activeCombatant.hp}
                  </span>
                  <span style={{ fontSize: 22, color: "var(--text-faint)" }}>/ {activeCombatant.maxHp}</span>
                </div>
                <div style={{ marginTop: 8, height: 8, background: "var(--border)", borderRadius: 4, overflow: "hidden" }}>
                  <div style={{ height: "100%", borderRadius: 4, transition: "width 0.3s, background 0.3s",
                    width: `${Math.round((activeCombatant.hp / activeCombatant.maxHp) * 100)}%`,
                    background: activeCombatant.hp < activeCombatant.maxHp * 0.25 ? "var(--red)" : activeCombatant.hp < activeCombatant.maxHp * 0.5 ? "#c4844a" : "var(--green)",
                  }} />
                </div>
              </div>
            </div>

            {/* Damage / Heal controls */}
            <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
              <input
                value={hpDelta}
                onChange={e => setHpDelta(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter") applyDamage(); }}
                placeholder="Amount..."
                type="number" min="0"
                style={{ ...inputStyle, flex: 1, fontSize: 18, textAlign: "center" }}
              />
              <button onClick={applyDamage} style={{
                padding: "8px 16px", background: "rgba(196,74,74,0.15)",
                border: "1px solid rgba(196,74,74,0.4)", borderRadius: 5,
                color: "#e06868", fontFamily: "var(--font-head)", fontSize: 14,
                letterSpacing: "0.06em", cursor: "pointer",
              }}>DAMAGE</button>
              <button onClick={applyHeal} style={{
                padding: "8px 16px", background: "rgba(90,171,106,0.15)",
                border: "1px solid rgba(90,171,106,0.4)", borderRadius: 5,
                color: "var(--green)", fontFamily: "var(--font-head)", fontSize: 14,
                letterSpacing: "0.06em", cursor: "pointer",
              }}>HEAL</button>
            </div>

            {/* Conditions */}
            <div>
              <div style={{ fontFamily: "var(--font-head)", fontSize: 14, color: "var(--gold)", letterSpacing: "0.08em", marginBottom: 8 }}>CONDITIONS</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 10 }}>
                {Object.keys(CONDITION_COLORS).sort().map(cond => {
                  const active = (activeCombatant.conditions || []).includes(cond);
                  const col = CONDITION_COLORS[cond];
                  return (
                    <button key={cond} onClick={() => toggleCondition(cond)} style={{
                      background: active ? col.bg : "transparent",
                      border: `1px solid ${active ? col.border : "var(--border)"}`,
                      color: active ? col.text : "var(--text-faint)",
                      borderRadius: 12, padding: "3px 10px", fontSize: 13,
                      fontFamily: "var(--font-head)", letterSpacing: "0.04em",
                      cursor: "pointer", transition: "all 0.15s",
                    }}>{cond}</button>
                  );
                })}
              </div>
              {(activeCombatant.conditions || []).length === 0 ? (
                <div style={{ fontSize: 14, color: "var(--text-faint)", fontStyle: "italic" }}>No conditions active. Tap a chip above to apply.</div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  {activeCombatant.conditions.map(cond => {
                    const col = CONDITION_COLORS[cond] || { bg: "rgba(100,100,100,0.2)", border: "#666", text: "#999" };
                    const effect = CONDITION_EFFECTS[cond] || "See D&D 5e Player's Handbook for details.";
                    return (
                      <div key={cond} style={{ background: col.bg, border: `1px solid ${col.border}`, borderLeft: `3px solid ${col.border}`, borderRadius: 5, padding: "8px 10px" }}>
                        <div style={{ fontFamily: "var(--font-head)", fontSize: 13, color: col.text, letterSpacing: "0.06em", marginBottom: 3 }}>{cond.toUpperCase()}</div>
                        <div style={{ fontSize: 14, color: "var(--text-dim)", lineHeight: 1.5 }}>{effect}</div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        )}
        {activeTab === "hp" && !activeCombatant && (
          <div style={{ color: "var(--text-faint)", fontSize: 16, fontStyle: "italic", padding: "20px 0" }}>
            No combatant selected.
          </div>
        )}

        {/* Tab: TACTICS */}
        {activeTab === "tactics" && (
          <div style={{ paddingBottom: 24 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
              <div style={{ fontFamily: "var(--font-head)", fontSize: 14, color: "var(--gold)", letterSpacing: "0.1em" }}>
                ⚔ HOW TO PLAY THIS MONSTER
              </div>
              <button
                onClick={generateTactics}
                disabled={tacticsLoading}
                style={{
                  background: tacticsLoading ? "transparent" : "rgba(201,168,76,0.1)",
                  border: "1px solid rgba(201,168,76,0.35)",
                  borderRadius: 4, color: tacticsLoading ? "var(--text-faint)" : "var(--gold)",
                  fontFamily: "var(--font-head)", fontSize: 10, letterSpacing: "0.08em",
                  padding: "4px 10px", cursor: tacticsLoading ? "default" : "pointer",
                  transition: "all 0.15s",
                }}
              >{tacticsLoading ? "Generating…" : (sb.tactics||[]).length > 0 ? "↺ Regenerate" : "✦ Generate"}</button>
            </div>

            {tacticsError && <div style={{ fontSize: 14, color: "#e06868", marginBottom: 12, fontStyle: "italic" }}>{tacticsError}</div>}

            {(sb.tactics||[]).length === 0 && tacticsLoading && (
              <div style={{ color: "var(--text-faint)", fontSize: 16, fontStyle: "italic", marginBottom: 20 }}>
                Generating tactics via Gemini…
              </div>
            )}
            {(sb.tactics||[]).length === 0 && !tacticsLoading && (
              <div style={{ color: "var(--text-faint)", fontSize: 16, fontStyle: "italic", marginBottom: 20 }}>
                Fetching tactics…
              </div>
            )}

            <div style={{ display: "flex", flexDirection: "column", gap: 14, marginBottom: 24 }}>
              {(sb.tactics||[]).map((t, i) => (
                <div key={i} style={{
                  display: "flex", gap: 14, alignItems: "flex-start",
                  background: "rgba(201,168,76,0.04)",
                  border: "1px solid rgba(201,168,76,0.12)",
                  borderRadius: 6, padding: "12px 14px",
                }}>
                  <span style={{ color: "var(--gold)", fontSize: 17, lineHeight: 1, flexShrink: 0, marginTop: 2, fontFamily: "var(--font-head)" }}>•</span>
                  <span style={{ fontSize: 16, color: "var(--text-dim)", lineHeight: 1.7 }}>{t}</span>
                </div>
              ))}
            </div>

            {/* Flee / Surrender callout */}
            {(sb.fleeThreshold || (sb.tactics||[]).length > 0) && (
              <div style={{
                display: "flex", gap: 12, alignItems: "flex-start",
                background: "rgba(196,74,74,0.08)",
                border: "1px solid rgba(196,74,74,0.25)",
                borderLeft: "3px solid #c44a4a",
                borderRadius: 6, padding: "12px 14px",
              }}>
                <span style={{ fontSize: 18, flexShrink: 0, lineHeight: 1, marginTop: 1 }}>🏃</span>
                <div>
                  <div style={{ fontFamily: "var(--font-head)", fontSize: 14, color: "#e06868", letterSpacing: "0.08em", marginBottom: 4 }}>
                    FLEE / SURRENDER THRESHOLD
                  </div>
                  <div style={{ fontSize: 16, color: "var(--text-dim)", lineHeight: 1.6 }}>
                    {sb.fleeThreshold || "Flees at ~30% HP if allies are dead — hobgoblins are disciplined, not suicidal."}
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

// ─── RIGHT PANEL ─────────────────────────────────────────────────────────────

function QuickActionBtn({ id, icon, label, subtitle, isActive, onClick }) {
  return (
    <button
      onClick={onClick}
      style={{
        width: "100%",
        background: isActive ? "rgba(201,168,76,0.1)" : "var(--card)",
        border: `1px solid ${isActive ? "var(--gold)" : "var(--border)"}`,
        borderRadius: 6,
        padding: "9px 12px",
        cursor: "pointer",
        textAlign: "left",
        transition: "all 0.15s ease",
        display: "flex",
        flexDirection: "column",
        gap: 2,
      }}
      onMouseEnter={e => { if (!isActive) e.currentTarget.style.borderColor = "var(--gold-dim)"; }}
      onMouseLeave={e => { if (!isActive) e.currentTarget.style.borderColor = "var(--border)"; }}
    >
      <div style={{
        display: "flex", alignItems: "center", gap: 7,
      }}>
        <span style={{ fontSize: 16 }}>{icon}</span>
        <span style={{
          fontFamily: "var(--font-head)",
          fontSize: 13,
          fontWeight: 600,
          color: isActive ? "var(--gold)" : "var(--text)",
          letterSpacing: "0.04em",
        }}>{label}</span>
      </div>
      <div style={{ fontSize: 13, color: "var(--text-dim)", paddingLeft: 21 }}>{subtitle}</div>
    </button>
  );
}

function RightPanel({ combatants, activeIdx, tweaks, aiProvider, setTweak }) {
  const [activePrompt, setActivePrompt] = useState("Describe This Hit");
  const [fieldValues, setFieldValues] = useState({
    "Describe This Hit": { damage: "14", hpState: "Bloodied (25-50%)" },
    "Flee or Fight?": { hpPercent: "27", situation: "Allies fallen" },
    "Smart Move": { context: "" },
  });
  const [aiResponse, setAiResponse] = useState(AI_PROMPTS["Describe This Hit"].defaultResponse);
  const [aiResponseProvider, setAiResponseProvider] = useState(null);
  const [loading, setLoading] = useState(false);
  const [freeform, setFreeform] = useState("");
  const [freeformLoading, setFreeformLoading] = useState(false);
  const [freeformResponse, setFreeformResponse] = useState("");
  const [freeformResponseProvider, setFreeformResponseProvider] = useState(null);

  const prompt = AI_PROMPTS[activePrompt];

  function setField(key, val) {
    setFieldValues(prev => ({
      ...prev,
      [activePrompt]: { ...prev[activePrompt], [key]: val }
    }));
  }

  async function generate() {
    setLoading(true);
    setAiResponse("");
    const vals = fieldValues[activePrompt] || {};
    const promptText = prompt.buildPrompt(vals, combatants, activeIdx);
    try {
      const res = await fetch("/api/ai/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt: promptText, max_tokens: 80, provider: aiProvider || "claude" }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || `Server error ${res.status}`);
      setAiResponse(data.content);
      setAiResponseProvider(data.fallback ? "claude-fallback" : data.provider);
    } catch(e) {
      setAiResponse(`Error: ${e.message}`);
      setAiResponseProvider(null);
    }
    setLoading(false);
  }

  async function sendFreeform() {
    if (!freeform.trim()) return;
    setFreeformLoading(true);
    setFreeformResponse("");
    const active = combatants[activeIdx];
    const contextPrompt = `You are a D&D 5e assistant for a DM. Current combat: ${combatants.map(c => `${c.name} (${c.type}, ${c.hp}/${c.maxHp} HP)`).join(", ")}. Active combatant: ${active.name}.\n\n${freeform}`;
    try {
      const res = await fetch("/api/ai/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt: contextPrompt, max_tokens: 200, provider: aiProvider || "claude" }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || `Server error ${res.status}`);
      setFreeformResponse(data.content);
      setFreeformResponseProvider(data.fallback ? "claude-fallback" : data.provider);
    } catch(e) {
      setFreeformResponse(`Error: ${e.message}`);
      setFreeformResponseProvider(null);
    }
    setFreeformLoading(false);
  }

  return (
    <div style={{
      width: tweaks.rightPanelWidth || 280,
      minWidth: tweaks.rightPanelWidth || 280,
      display: "flex",
      flexDirection: "column",
      overflow: "hidden",
    }}>
      {/* Header */}
      <div style={{ padding: "14px 14px 10px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ fontFamily: "var(--font-head)", fontSize: 18, fontWeight: 700, color: "var(--gold)", letterSpacing: "0.06em" }}>
            AI Assist
          </div>
          <div style={{ display:"flex", border:"1px solid var(--border)", borderRadius:4, overflow:"hidden" }}>
            {["claude","gemini"].map(p => {
              const active = aiProvider === p;
              return (
                <button key={p} onClick={() => setTweak && setTweak("aiProvider", p)} style={{
                  background: active ? "rgba(201,168,76,0.12)" : "transparent",
                  border: "none",
                  borderLeft: p === "gemini" ? "1px solid var(--border)" : "none",
                  color: active ? "var(--gold)" : "var(--text-faint)",
                  cursor: "pointer", fontFamily: "var(--font-head)",
                  fontSize: 10, letterSpacing: "0.1em", padding: "4px 10px",
                  transition: "color 0.15s, background 0.15s",
                }}>{p.toUpperCase()}</button>
              );
            })}
          </div>
        </div>
        <div style={{ fontSize: 13, color: "var(--text-faint)", marginTop: 4 }}>
          {tweaks.aiProvider === "gemini" ? "Gemini 2.0 Flash · Free Tier · 15 req/min" : "Claude Haiku · ~$0.001 per query · ~1000 per dollar"}
        </div>
      </div>

      <div style={{ flex: 1, overflowY: "auto", padding: "12px" }}>
        {/* Quick action buttons */}
        <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 12 }}>
          {Object.entries(AI_PROMPTS).map(([key, p]) => (
            <QuickActionBtn
              key={key}
              id={key}
              icon={p.icon}
              label={key}
              subtitle={p.subtitle}
              isActive={activePrompt === key}
              onClick={() => {
                setActivePrompt(key);
                setAiResponse(p.defaultResponse || "");
              }}
            />
          ))}
        </div>

        {/* Expanded prompt form */}
        <div style={{
          background: "rgba(0,0,0,0.2)",
          border: "1px solid var(--border)",
          borderRadius: 6,
          padding: "12px",
          marginBottom: 12,
        }}>
          <div style={{
            fontFamily: "var(--font-head)",
            fontSize: 10,
            color: "var(--gold)",
            letterSpacing: "0.1em",
            marginBottom: 10,
          }}>
            {prompt.icon} {activePrompt.toUpperCase()}
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 10 }}>
            {prompt.fields.map(f => (
              <div key={f.key}>
                <label style={{ display: "block", fontSize: 13, color: "var(--text-dim)", marginBottom: 4, fontFamily: "var(--font-head)", letterSpacing: "0.04em" }}>
                  {f.label}
                </label>
                {f.type === "select" ? (
                  <select
                    value={fieldValues[activePrompt]?.[f.key] ?? f.defaultValue}
                    onChange={e => setField(f.key, e.target.value)}
                    style={{ ...inputStyle, width: "100%" }}
                  >
                    {f.options.map(o => <option key={o}>{o}</option>)}
                  </select>
                ) : (
                  <input
                    value={fieldValues[activePrompt]?.[f.key] ?? f.defaultValue}
                    onChange={e => setField(f.key, e.target.value)}
                    placeholder={f.placeholder}
                    style={{ ...inputStyle, width: "100%" }}
                  />
                )}
              </div>
            ))}
          </div>
          <button
            onClick={generate}
            disabled={loading}
            style={{
              width: "100%",
              padding: "9px 0",
              background: loading ? "var(--gold-dim)" : "linear-gradient(135deg, #c9a84c 0%, #a8873a 100%)",
              border: "none",
              borderRadius: 5,
              color: "#111318",
              fontFamily: "var(--font-head)",
              fontSize: 13,
              fontWeight: 700,
              letterSpacing: "0.12em",
              cursor: loading ? "not-allowed" : "pointer",
              transition: "opacity 0.15s",
            }}
          >
            {loading ? "GENERATING..." : "GENERATE"}
          </button>
        </div>

        {/* AI Response */}
        {(aiResponse || loading) && (
          <div style={{
            background: "#141820",
            border: "1px solid var(--border)",
            borderLeft: "3px solid var(--gold-dim)",
            borderRadius: 6,
            padding: "12px",
            marginBottom: 14,
          }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <div style={{ fontSize: 9, color: "var(--gold-dim)", fontFamily: "var(--font-head)", letterSpacing: "0.1em" }}>
                AI RESPONSE
              </div>
              {aiResponseProvider === "claude-fallback" && (
                <div style={{ fontSize: 9, color: "#c44a4a", fontFamily: "var(--font-head)", letterSpacing: "0.08em", background: "rgba(196,74,74,0.12)", border: "1px solid rgba(196,74,74,0.3)", borderRadius: 3, padding: "2px 6px" }}>
                  ⚠ CLAUDE FALLBACK
                </div>
              )}
            </div>
            {loading ? (
              <div style={{ color: "var(--text-faint)", fontSize: 14, fontStyle: "italic" }}>
                Consulting the arcane...
              </div>
            ) : (
              <p style={{ fontSize: 15, color: "var(--text-dim)", lineHeight: 1.7, fontStyle: "italic" }}>
                "{aiResponse}"
              </p>
            )}
          </div>
        )}

        {/* Freeform response */}
        {freeformResponse && (
          <div style={{
            background: "#141820",
            border: "1px solid var(--border)",
            borderLeft: "3px solid var(--teal)",
            borderRadius: 6,
            padding: "12px",
            marginBottom: 14,
          }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <div style={{ fontSize: 9, color: "var(--teal)", fontFamily: "var(--font-head)", letterSpacing: "0.1em" }}>
                ANSWER
              </div>
              {freeformResponseProvider === "claude-fallback" && (
                <div style={{ fontSize: 9, color: "#c44a4a", fontFamily: "var(--font-head)", letterSpacing: "0.08em", background: "rgba(196,74,74,0.12)", border: "1px solid rgba(196,74,74,0.3)", borderRadius: 3, padding: "2px 6px" }}>
                  ⚠ CLAUDE FALLBACK
                </div>
              )}
            </div>
            <p style={{ fontSize: 15, color: "var(--text-dim)", lineHeight: 1.7 }}>
              {freeformLoading ? "Consulting the arcane..." : freeformResponse}
            </p>
          </div>
        )}
      </div>

      {/* Freeform input - pinned to bottom */}
      <div style={{
        padding: "10px 12px",
        borderTop: "1px solid var(--border)",
        display: "flex",
        gap: 6,
      }}>
        <input
          value={freeform}
          onChange={e => setFreeform(e.target.value)}
          onKeyDown={e => e.key === "Enter" && sendFreeform()}
          placeholder="Ask anything..."
          style={{ ...inputStyle, flex: 1, fontSize: 14 }}
        />
        <button
          onClick={sendFreeform}
          disabled={freeformLoading}
          style={{
            background: freeformLoading ? "var(--card)" : "rgba(201,168,76,0.15)",
            border: "1px solid var(--gold-dim)",
            borderRadius: 5,
            color: "var(--gold)",
            padding: "0 10px",
            fontSize: 16,
            cursor: "pointer",
            transition: "background 0.15s",
          }}
          onMouseEnter={e => { if(!freeformLoading) e.currentTarget.style.background = "rgba(201,168,76,0.25)"; }}
          onMouseLeave={e => { if(!freeformLoading) e.currentTarget.style.background = "rgba(201,168,76,0.15)"; }}
        >
          →
        </button>
      </div>
    </div>
  );
}

// ─── ADD COMBATANT MODAL ─────────────────────────────────────────────────────

function AddCombatantModal({ onClose, onAdd, onAddMultiple, prefill, allMonsters }) {
  const initialTab = prefill ? "monster" : "custom";
  const [tab, setTab] = useState(initialTab);
  const [players, setPlayers] = useState([]);

  const [monsterSearch, setMonsterSearch] = useState(prefill ? (prefill.name || "") : "");
  const [showMonsterResults, setShowMonsterResults] = useState(false);
  const [selectedMonsterData, setSelectedMonsterData] = useState(prefill || null);
  const [selectedPlayerData, setSelectedPlayerData] = useState(null);

  // Monster tab entry fields (separate from custom tab)
  const [monsterName, setMonsterName] = useState(prefill ? (prefill.name || "") : "");
  const [monsterHp, setMonsterHp] = useState(() => {
    if (!prefill) return "";
    const hpVal = prefill.hit_points || prefill.maxHp || prefill.hp;
    if (typeof hpVal === "number") return String(hpVal);
    if (typeof hpVal === "string") { const m = hpVal.match(/\d+/); return m ? m[0] : ""; }
    return "";
  });
  const [monsterInitiative, setMonsterInitiative] = useState("");
  const modalSearchRef = useRef(null);

  // Custom tab fields
  const [name, setName] = useState("");
  const [hp, setHp] = useState("");
  const [initiative, setInitiative] = useState("");
  const [type, setType] = useState("Monster");

  useEffect(() => {
    fetch("/api/players").then(r => r.json()).then(d => setPlayers(d.players || [])).catch(() => {});
  }, []);

  useEffect(() => {
    const handler = e => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);

  const monsterResults = monsterSearch.trim().length >= 2 && allMonsters.length > 0
    ? allMonsters.filter(m => m.name.toLowerCase().includes(monsterSearch.toLowerCase())).slice(0, 8)
    : [];

  function selectMonster(m) {
    setSelectedMonsterData(m);
    setMonsterSearch(m.name);
    setMonsterName(m.name);
    const hpVal = m.hit_points || m.hp;
    const hpNum = typeof hpVal === "number" ? hpVal : (String(hpVal || "").match(/\d+/) || [])[0];
    setMonsterHp(hpNum ? String(hpNum) : "10");
    setShowMonsterResults(false);
    // Stay on Monster tab — user sees the stat preview + can adjust before adding
  }

  function selectPlayer(p) {
    setSelectedPlayerData(p);
    setName(p.name);
    setHp(p.hp ? String(p.hp) : "");
    setInitiative(p.initiativeBonus != null ? String(p.initiativeBonus) : "");
    setType("PC");
    setTab("custom");
  }

  function submitMonster() {
    if (!monsterName.trim()) return;
    const hpVal = parseInt(monsterHp) || 10;
    onAdd({
      id: Date.now(),
      name: monsterName.trim(),
      _monsterName: selectedMonsterData ? selectedMonsterData.name : monsterName.trim(),
      type: "Monster",
      hp: hpVal, maxHp: hpVal,
      conditions: [],
      initiative: parseInt(monsterInitiative) || 0,
    });
    onClose();
  }

  function submit() {
    if (!name.trim()) return;
    const hpVal = parseInt(hp) || 10;
    const combatant = {
      id: Date.now(),
      name: name.trim(),
      type,
      hp: hpVal, maxHp: hpVal,
      conditions: [],
      initiative: parseInt(initiative) || 0,
    };
    if (type === "PC" && selectedPlayerData) {
      combatant.pcData = selectedPlayerData;
    }
    onAdd(combatant);
    onClose();
  }

  function handleBackdrop(e) { if (e.target === e.currentTarget) onClose(); }

  const tabBtnStyle = (active) => ({
    flex: 1, padding: "8px 0", background: "none", border: "none",
    borderBottom: `2px solid ${active ? "var(--gold)" : "transparent"}`,
    color: active ? "var(--gold)" : "var(--text-dim)",
    fontFamily: "var(--font-head)", fontSize: 10, letterSpacing: "0.08em",
    cursor: "pointer", transition: "all 0.15s", marginBottom: -1,
  });

  return (
    <div onClick={handleBackdrop} style={{
      position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)",
      display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000,
    }}>
      <div style={{
        background: "var(--card)", border: "1px solid var(--border)",
        borderRadius: 8, width: 380, maxWidth: "90vw",
        boxShadow: "0 8px 40px rgba(0,0,0,0.6)", overflow: "hidden",
      }}>
        {/* Header */}
        <div style={{ padding: "14px 16px 0", borderBottom: "1px solid var(--border)" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <div style={{ fontFamily: "var(--font-head)", fontSize: 12, color: "var(--gold)", letterSpacing: "0.1em" }}>ADD COMBATANT</div>
            <button onClick={onClose} style={{ background: "none", border: "none", color: "var(--text-faint)", cursor: "pointer", fontSize: 16, padding: "0 2px" }}>✕</button>
          </div>
          <div style={{ display: "flex", borderBottom: "1px solid var(--border)" }}>
            {[["players","PLAYERS"],["monster","MONSTER"],["custom","CUSTOM"]].map(([id, label]) => (
              <button key={id} style={tabBtnStyle(tab === id)} onClick={() => setTab(id)}>{label}</button>
            ))}
          </div>
        </div>

        {/* Body */}
        <div style={{ padding: 16, maxHeight: 420, overflowY: "auto" }}>

          {/* Players tab */}
          {tab === "players" && (
            players.length === 0 ? (
              <div style={{ color: "var(--text-faint)", fontSize: 12, fontStyle: "italic", textAlign: "center", padding: "24px 0" }}>
                No campaign players found.<br />Add PC files to campaign/[name]/pcs/
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                <button onClick={() => {
                  const all = players.map((p, i) => ({
                    id: Date.now() + i,
                    name: p.name, type: "PC",
                    hp: p.hp || 10, maxHp: p.hp || 10,
                    conditions: [], initiative: 0, pcData: p,
                  }));
                  onAddMultiple(all);
                  onClose();
                }} style={{
                  width: "100%", padding: "9px 0",
                  background: "rgba(74,120,196,0.15)",
                  border: "1px solid rgba(74,120,196,0.4)",
                  borderRadius: 6, color: "#6a9de8",
                  fontFamily: "var(--font-head)", fontSize: 11, fontWeight: 700,
                  letterSpacing: "0.1em", cursor: "pointer",
                }}>
                  + ADD ALL PLAYERS TO COMBAT
                </button>
                {players.map((p, i) => (
                  <button key={i} onClick={() => selectPlayer(p)} style={{
                    background: "var(--bg)", border: "1px solid var(--border)",
                    borderRadius: 6, padding: "10px 12px", cursor: "pointer",
                    textAlign: "left", transition: "border-color 0.15s",
                  }}
                    onMouseEnter={e => e.currentTarget.style.borderColor = "var(--gold-dim)"}
                    onMouseLeave={e => e.currentTarget.style.borderColor = "var(--border)"}
                  >
                    <div style={{ fontFamily: "var(--font-head)", fontSize: 11, color: "var(--text)", letterSpacing: "0.04em" }}>{p.name}</div>
                    <div style={{ fontSize: 11, color: "var(--text-faint)", marginTop: 2 }}>
                      {[p.charClass, p.race].filter(Boolean).join(" · ")}
                      {p.hp ? ` · ${p.hp} HP` : ""}
                      {p.level ? ` · Level ${p.level}` : ""}
                    </div>
                  </button>
                ))}
              </div>
            )
          )}

          {/* Monster tab */}
          {tab === "monster" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <div>
                    <input
                      ref={modalSearchRef}
                      value={monsterSearch}
                      onChange={e => { setMonsterSearch(e.target.value); setShowMonsterResults(true); setSelectedMonsterData(null); }}
                      onFocus={() => setShowMonsterResults(true)}
                      onBlur={() => setTimeout(() => setShowMonsterResults(false), 150)}
                      placeholder="Search monsters..."
                      autoFocus={!prefill}
                      style={{ ...inputStyle, width: "100%", fontSize: 15 }}
                    />
                    <FloatingDropdown inputRef={modalSearchRef} show={showMonsterResults && monsterResults.length > 0}>
                      {monsterResults.map((m, i) => (
                        <div key={i} onMouseDown={() => selectMonster(m)} style={{
                          padding: "9px 12px", cursor: "pointer",
                          display: "flex", justifyContent: "space-between",
                          borderBottom: "1px solid var(--border)", fontSize: 14,
                        }}
                          onMouseEnter={e => e.currentTarget.style.background = "var(--card-hover)"}
                          onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                        >
                          <span style={{ color: "var(--text)" }}>{m.name}</span>
                          <span style={{ color: "var(--gold-dim)", fontFamily: "var(--font-head)", fontSize: 12 }}>CR {m.cr || m.challenge_rating}</span>
                        </div>
                      ))}
                    </FloatingDropdown>
                  </div>

              {selectedMonsterData ? (
                <>
                  {/* Monster stat preview */}
                  <div style={{ background: "rgba(201,168,76,0.05)", border: "1px solid rgba(201,168,76,0.2)", borderRadius: 6, padding: "10px 12px", fontSize: 14 }}>
                    <div style={{ fontFamily: "var(--font-head)", fontSize: 13, color: "var(--gold)", marginBottom: 4 }}>{selectedMonsterData.name}</div>
                    <div style={{ color: "var(--text-faint)", display: "flex", gap: 12 }}>
                      <span>CR {selectedMonsterData.cr || selectedMonsterData.challenge_rating}</span>
                      <span>HP {selectedMonsterData.hit_points || selectedMonsterData.hp}</span>
                      <span>AC {selectedMonsterData.armor_class || selectedMonsterData.ac}</span>
                    </div>
                  </div>
                  {/* Editable entry fields */}
                  <div>
                    <label style={{ display: "block", fontSize: 11, color: "var(--text-dim)", marginBottom: 4, fontFamily: "var(--font-head)", letterSpacing: "0.04em" }}>NAME (optional rename)</label>
                    <input value={monsterName} onChange={e => setMonsterName(e.target.value)}
                      style={{ ...inputStyle, width: "100%" }} />
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <div style={{ flex: 1 }}>
                      <label style={{ display: "block", fontSize: 11, color: "var(--text-dim)", marginBottom: 4, fontFamily: "var(--font-head)", letterSpacing: "0.04em" }}>HP</label>
                      <input value={monsterHp} onChange={e => setMonsterHp(e.target.value)} type="number"
                        style={{ ...inputStyle, width: "100%" }} />
                    </div>
                    <div style={{ flex: 1 }}>
                      <label style={{ display: "block", fontSize: 11, color: "var(--text-dim)", marginBottom: 4, fontFamily: "var(--font-head)", letterSpacing: "0.04em" }}>INITIATIVE</label>
                      <input value={monsterInitiative} onChange={e => setMonsterInitiative(e.target.value)}
                        placeholder="Roll result" type="number" style={{ ...inputStyle, width: "100%" }}
                        onKeyDown={e => e.key === "Enter" && submitMonster()} />
                    </div>
                  </div>
                  <button onClick={submitMonster} style={{
                    width: "100%", padding: "11px 0",
                    background: "linear-gradient(135deg, #c9a84c 0%, #a8873a 100%)",
                    border: "none", borderRadius: 6, color: "#111318",
                    fontFamily: "var(--font-head)", fontSize: 11, fontWeight: 700,
                    letterSpacing: "0.1em", cursor: "pointer",
                  }}>
                    ADD TO COMBAT
                  </button>
                </>
              ) : (
                allMonsters.length === 0 && (
                  <div style={{ color: "var(--text-faint)", fontSize: 12, fontStyle: "italic", textAlign: "center" }}>Loading monster list...</div>
                )
              )}
            </div>
          )}

          {/* Custom tab */}
          {tab === "custom" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <div>
                <label style={{ display: "block", fontSize: 11, color: "var(--text-dim)", marginBottom: 4, fontFamily: "var(--font-head)", letterSpacing: "0.04em" }}>NAME</label>
                <input value={name} onChange={e => setName(e.target.value)} placeholder="Combatant name..."
                  style={{ ...inputStyle, width: "100%" }} autoFocus={!prefill}
                  onKeyDown={e => e.key === "Enter" && submit()} />
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <div style={{ flex: 1 }}>
                  <label style={{ display: "block", fontSize: 11, color: "var(--text-dim)", marginBottom: 4, fontFamily: "var(--font-head)", letterSpacing: "0.04em" }}>HP</label>
                  <input value={hp} onChange={e => setHp(e.target.value)} placeholder="e.g. 28" type="number"
                    style={{ ...inputStyle, width: "100%" }} />
                </div>
                <div style={{ flex: 1 }}>
                  <label style={{ display: "block", fontSize: 11, color: "var(--text-dim)", marginBottom: 4, fontFamily: "var(--font-head)", letterSpacing: "0.04em" }}>INITIATIVE</label>
                  <input value={initiative} onChange={e => setInitiative(e.target.value)} placeholder="Roll result" type="number"
                    style={{ ...inputStyle, width: "100%" }} />
                </div>
              </div>
              <div>
                <label style={{ display: "block", fontSize: 11, color: "var(--text-dim)", marginBottom: 4, fontFamily: "var(--font-head)", letterSpacing: "0.04em" }}>TYPE</label>
                <div style={{ display: "flex", gap: 6 }}>
                  {["PC","Monster"].map(t => (
                    <button key={t} onClick={() => setType(t)} style={{
                      flex: 1, padding: "7px 0",
                      background: type === t ? (t === "PC" ? "rgba(74,120,196,0.2)" : "rgba(196,74,74,0.2)") : "var(--bg)",
                      border: `1px solid ${type === t ? (t === "PC" ? "var(--blue)" : "var(--red)") : "var(--border)"}`,
                      borderRadius: 5,
                      color: type === t ? (t === "PC" ? "#6a9de8" : "#e06868") : "var(--text-dim)",
                      fontFamily: "var(--font-head)", fontSize: 10, letterSpacing: "0.06em", cursor: "pointer",
                    }}>{t}</button>
                  ))}
                </div>
              </div>
              <button onClick={submit} style={{
                width: "100%", padding: "11px 0",
                background: name.trim() ? "linear-gradient(135deg, #c9a84c 0%, #a8873a 100%)" : "var(--border)",
                border: "none", borderRadius: 6,
                color: name.trim() ? "#111318" : "var(--text-faint)",
                fontFamily: "var(--font-head)", fontSize: 11, fontWeight: 700,
                letterSpacing: "0.1em", cursor: name.trim() ? "pointer" : "not-allowed",
                transition: "background 0.15s", marginTop: 4,
              }}>
                ADD TO COMBAT
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
