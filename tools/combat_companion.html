// ─── SESSIONS MODAL ──────────────────────────────────────────────────────────

function SessionsModal({ onClose, encName, onSave, onLoad }) {
  const [tab, setTab] = useState("save");
  const [saveName, setSaveName] = useState(encName || "New Encounter");
  const [saving, setSaving] = useState(false);
  const [saveMsg, setSaveMsg] = useState("");
  const [sessions, setSessions] = useState([]);
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    fetch("/api/sessions").then(r => r.json()).then(d => setSessions(d.sessions || [])).catch(() => {});
  }, []);

  useEffect(() => {
    const h = e => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);

  async function handleSave() {
    if (!saveName.trim()) return;
    setSaving(true); setSaveMsg("");
    try {
      await onSave(saveName.trim());
      setSaveMsg("✓ Saved!");
      const d = await fetch("/api/sessions").then(r => r.json());
      setSessions(d.sessions || []);
    } catch(e) { setSaveMsg("Save failed."); }
    setSaving(false);
  }

  async function handleLoad(id) {
    setLoading(true);
    try {
      const data = await fetch(`/api/sessions/${id}`).then(r => r.json());
      onLoad(data);
      onClose();
    } catch(e) { alert("Failed to load session."); }
    setLoading(false);
  }

  async function handleDelete(id, e) {
    e.stopPropagation();
    await fetch(`/api/sessions/${id}`, { method: "DELETE" });
    setSessions(prev => prev.filter(s => s.id !== id));
  }

  function formatDate(iso) {
    if (!iso) return "";
    try { return new Date(iso).toLocaleString(undefined, { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" }); }
    catch(e) { return iso; }
  }

  const tabBtn = (id, label) => ({
    flex: 1, padding: "8px 0", background: "none", border: "none",
    borderBottom: `2px solid ${tab === id ? "var(--gold)" : "transparent"}`,
    color: tab === id ? "var(--gold)" : "var(--text-dim)",
    fontFamily: "var(--font-head)", fontSize: 11, letterSpacing: "0.08em",
    cursor: "pointer", transition: "all 0.15s", marginBottom: -1,
  });

  return (
    <div onClick={e => e.target === e.currentTarget && onClose()} style={{
      position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)",
      display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000,
    }}>
      <div style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 8, width: 400, maxWidth: "92vw", boxShadow: "0 8px 40px rgba(0,0,0,0.6)", overflow: "hidden" }}>
        <div style={{ padding: "14px 16px 0", borderBottom: "1px solid var(--border)" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <div style={{ fontFamily: "var(--font-head)", fontSize: 13, color: "var(--gold)", letterSpacing: "0.1em" }}>SESSIONS</div>
            <button onClick={onClose} style={{ background: "none", border: "none", color: "var(--text-faint)", cursor: "pointer", fontSize: 16 }}>✕</button>
          </div>
          <div style={{ display: "flex", borderBottom: "1px solid var(--border)" }}>
            <button style={tabBtn("save", "SAVE")} onClick={() => setTab("save")}>SAVE</button>
            <button style={tabBtn("load", "LOAD")} onClick={() => setTab("load")}>LOAD</button>
          </div>
        </div>

        <div style={{ padding: 16, maxHeight: 420, overflowY: "auto" }}>
          {tab === "save" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <div>
                <div style={{ fontSize: 11, color: "var(--text-dim)", fontFamily: "var(--font-head)", letterSpacing: "0.06em", marginBottom: 6 }}>SESSION NAME</div>
                <input
                  autoFocus value={saveName} onChange={e => setSaveName(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && handleSave()}
                  placeholder="e.g. Goblin Ambush — Act 2"
                  style={{ ...inputStyle, width: "100%", fontSize: 15 }}
                />
              </div>
              <button onClick={handleSave} disabled={saving || !saveName.trim()} style={{
                width: "100%", padding: "11px 0",
                background: saveName.trim() ? "linear-gradient(135deg, #c9a84c 0%, #a8873a 100%)" : "var(--border)",
                border: "none", borderRadius: 6,
                color: saveName.trim() ? "#111318" : "var(--text-faint)",
                fontFamily: "var(--font-head)", fontSize: 12, fontWeight: 700,
                letterSpacing: "0.1em", cursor: saveName.trim() ? "pointer" : "not-allowed",
              }}>
                {saving ? "SAVING…" : "💾 SAVE SESSION"}
              </button>
              {saveMsg && <div style={{ textAlign: "center", fontSize: 13, color: saveMsg.startsWith("✓") ? "var(--green)" : "#e06868" }}>{saveMsg}</div>}
              <div style={{ fontSize: 12, color: "var(--text-faint)", fontStyle: "italic", lineHeight: 1.5 }}>
                Saves current combatants, HP, conditions, portraits, round number, and encounter notes.
              </div>
            </div>
          )}

          {tab === "load" && (
            <div>
              {sessions.length === 0 ? (
                <div style={{ color: "var(--text-faint)", fontSize: 13, fontStyle: "italic", textAlign: "center", padding: "24px 0" }}>
                  No saved sessions yet.<br/>Use the Save tab to save your first encounter.
                </div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {sessions.map(s => (
                    <div key={s.id} onClick={() => handleLoad(s.id)} style={{
                      background: "var(--bg)", border: "1px solid var(--border)", borderRadius: 6,
                      padding: "10px 12px", cursor: "pointer", transition: "border-color 0.15s",
                      display: "flex", alignItems: "center", justifyContent: "space-between",
                    }}
                      onMouseEnter={e => e.currentTarget.style.borderColor = "var(--gold-dim)"}
                      onMouseLeave={e => e.currentTarget.style.borderColor = "var(--border)"}
                    >
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontFamily: "var(--font-head)", fontSize: 13, color: "var(--text)", letterSpacing: "0.03em", marginBottom: 3, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{s.name}</div>
                        <div style={{ fontSize: 12, color: "var(--text-faint)" }}>
                          {s.combatantCount} combatants · Round {s.round} · {formatDate(s.savedAt)}
                        </div>
                      </div>
                      <button onClick={e => handleDelete(s.id, e)} title="Delete" style={{
                        background: "none", border: "none", color: "var(--text-faint)", cursor: "pointer",
                        fontSize: 13, padding: "4px 6px", flexShrink: 0, transition: "color 0.15s",
                      }}
                        onMouseEnter={e => e.currentTarget.style.color = "#e06868"}
                        onMouseLeave={e => e.currentTarget.style.color = "var(--text-faint)"}
                      >✕</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── INITIATIVES MODAL ───────────────────────────────────────────────────────

function InitiativesModal({ combatants, onClose, onApply }) {
  const [values, setValues] = useState(() =>
    Object.fromEntries(combatants.map(c => [c.id, c.initiative != null ? String(c.initiative) : ""]))
  );
  const inputRefs = useRef({});

  useEffect(() => {
    const h = e => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);

  function handleKeyDown(e, idx) {
    if (e.key === "Enter" || (e.key === "Tab" && !e.shiftKey)) {
      e.preventDefault();
      const next = combatants[idx + 1];
      if (next) inputRefs.current[next.id]?.focus();
      else apply();
    }
  }

  function apply() {
    const map = {};
    for (const [id, val] of Object.entries(values)) {
      const n = parseInt(val);
      if (!isNaN(n)) map[id] = n;
    }
    onApply(map);
  }

  return (
    <div onClick={e => e.target === e.currentTarget && onClose()} style={{
      position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)",
      display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000,
    }}>
      <div style={{
        background: "var(--card)", border: "1px solid var(--border)",
        borderRadius: 8, width: 360, maxWidth: "90vw",
        boxShadow: "0 8px 40px rgba(0,0,0,0.6)", overflow: "hidden",
      }}>
        {/* Header */}
        <div style={{ padding: "14px 16px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ fontFamily: "var(--font-head)", fontSize: 12, color: "var(--gold)", letterSpacing: "0.1em" }}>⚡ SET INITIATIVES</div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "var(--text-faint)", cursor: "pointer", fontSize: 16, padding: "0 2px" }}>✕</button>
        </div>

        {/* Combatant rows */}
        <div style={{ padding: "8px 16px", maxHeight: 380, overflowY: "auto" }}>
          {combatants.length === 0 ? (
            <div style={{ color: "var(--text-faint)", fontSize: 13, fontStyle: "italic", textAlign: "center", padding: "24px 0" }}>
              No combatants in encounter.
            </div>
          ) : combatants.map((c, idx) => (
            <div key={c.id} style={{
              display: "flex", alignItems: "center", gap: 10,
              padding: "8px 0",
              borderBottom: idx < combatants.length - 1 ? "1px solid var(--border)" : "none",
            }}>
              <span style={{
                fontSize: 9, padding: "1px 6px", borderRadius: 20, flexShrink: 0,
                background: c.type === "PC" ? "rgba(74,120,196,0.25)" : "rgba(196,74,74,0.25)",
                border: `1px solid ${c.type === "PC" ? "var(--blue)" : "var(--red)"}`,
                color: c.type === "PC" ? "#6a9de8" : "#e06868",
                fontFamily: "var(--font-head)", letterSpacing: "0.04em",
              }}>{c.type === "PC" ? "PC" : "MON"}</span>
              <span style={{ flex: 1, fontFamily: "var(--font-head)", fontSize: 13, color: "var(--text)", letterSpacing: "0.02em", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {c.name}
              </span>
              <input
                ref={el => inputRefs.current[c.id] = el}
                autoFocus={idx === 0}
                type="number"
                value={values[c.id]}
                onChange={e => setValues(prev => ({ ...prev, [c.id]: e.target.value }))}
                onKeyDown={e => handleKeyDown(e, idx)}
                placeholder="—"
                style={{
                  width: 60, fontSize: 16, fontFamily: "var(--font-head)",
                  background: "#0d1017", border: "1px solid var(--border)",
                  borderRadius: 4, color: "var(--gold)", padding: "4px 8px",
                  textAlign: "center", outline: "none",
                }}
                onFocus={e => e.target.style.borderColor = "var(--gold-dim)"}
                onBlur={e => e.target.style.borderColor = "var(--border)"}
              />
            </div>
          ))}
        </div>

        {/* Footer */}
        <div style={{ padding: "12px 16px", borderTop: "1px solid var(--border)" }}>
          <div style={{ fontSize: 11, color: "var(--text-faint)", marginBottom: 10, fontStyle: "italic" }}>
            Tab or Enter to move between rows · Enter on last to apply
          </div>
          <button onClick={apply} style={{
            width: "100%", padding: "11px 0",
            background: "linear-gradient(135deg, #c9a84c 0%, #a8873a 100%)",
            border: "none", borderRadius: 6, color: "#111318",
            fontFamily: "var(--font-head)", fontSize: 12, fontWeight: 700,
            letterSpacing: "0.12em", cursor: "pointer",
          }}>
            APPLY & SORT
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── ROOT APP ────────────────────────────────────────────────────────────────

function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const [combatants, setCombatants] = useState(INITIAL_COMBATANTS);
  const [activeIdx, setActiveIdx] = useState(2); // Hobgoblin Captain starts active
  const [allMonsters, setAllMonsters] = useState([]);
  const [showAddModal, setShowAddModal] = useState(false);
  const [addModalPrefill, setAddModalPrefill] = useState(null);
  const [portraits, setPortraits] = useState({});
  const [encName, setEncName] = useState("New Encounter");
  const [encNote, setEncNote] = useState("Add a note about conditions, terrain...");
  const [roundNumber, setRoundNumber] = useState(1);
  const [showSessionModal, setShowSessionModal] = useState(false);
  const [showInitModal, setShowInitModal] = useState(false);

  useEffect(() => {
    fetch("/tools/monsters.json")
      .then(r => r.json())
      .then(data => setAllMonsters(Array.isArray(data) ? data : Object.values(data)))
      .catch(() => {});
  }, []);

  // Auto-generate portrait for any combatant that doesn't have one
  function generatePortrait(combatant) {
    const prompt = buildPortraitPrompt(combatant);
    const seed = Math.floor(Math.random() * 99999);
    const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=512&nologo=true&model=flux&seed=${seed}`;
    const img = new Image();
    img.onload = () => setPortraits(prev => ({ ...prev, [combatant.id]: url }));
    img.src = url;
  }

  function handleOpenAdd(prefill = null) {
    setAddModalPrefill(prefill || null);
    setShowAddModal(true);
  }

  function handleAddCombatant(c) {
    setCombatants(prev => [...prev, c]);
    generatePortrait(c);
  }

  function handleAddMultiple(newCombatants) {
    setCombatants(prev => [...prev, ...newCombatants]);
    newCombatants.forEach(c => generatePortrait(c));
  }

  function handleApplyInitiatives(map) {
    setCombatants(prev => {
      const activeId = prev[activeIdx]?.id;
      const updated = prev.map(c => map[c.id] !== undefined ? { ...c, initiative: map[c.id] } : c);
      const sorted = [...updated].sort((a, b) => b.initiative - a.initiative);
      const newActiveIdx = sorted.findIndex(c => c.id === activeId);
      if (newActiveIdx !== -1) setActiveIdx(newActiveIdx);
      return sorted;
    });
    setShowInitModal(false);
  }

  async function handleSaveSession(name) {
    const res = await fetch("/api/sessions", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, encounter: { name: encName, note: encNote, round: roundNumber }, activeIdx, combatants, portraits }),
    });
    if (!res.ok) throw new Error("Save failed");
  }

  function handleLoadSession(data) {
    setCombatants(data.combatants || []);
    setActiveIdx(data.activeIdx || 0);
    setPortraits(data.portraits || {});
    if (data.encounter) {
      setEncName(data.encounter.name || "New Encounter");
      setEncNote(data.encounter.note || "");
      setRoundNumber(data.encounter.round || 1);
    }
  }

  return (
    <>
      <style>{`
        @keyframes pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.5; transform: scale(1.4); }
        }
        @keyframes portraitFadeIn {
          from { opacity: 0; transform: scale(0.95); }
          to   { opacity: 1; transform: scale(1); }
        }
        input:focus, select:focus {
          border-color: var(--gold-dim) !important;
          outline: none;
        }
      `}</style>

      <div style={{
        display: "flex",
        height: "100vh",
        overflow: "hidden",
        background: "var(--bg)",
      }}>
        <LeftPanel
          combatants={combatants}
          setCombatants={setCombatants}
          activeIdx={activeIdx}
          setActiveIdx={setActiveIdx}
          tweaks={tweaks}
          onOpenAdd={handleOpenAdd}
          onOpenInitiatives={() => setShowInitModal(true)}
          portraits={portraits}
          encName={encName} setEncName={setEncName}
          encNote={encNote} setEncNote={setEncNote}
          roundNumber={roundNumber} setRoundNumber={setRoundNumber}
          onOpenSessions={() => setShowSessionModal(true)}
        />
        <CenterPanel
          combatants={combatants}
          activeIdx={activeIdx}
          setCombatants={setCombatants}
          allMonsters={allMonsters}
          onOpenAdd={handleOpenAdd}
          portraits={portraits}
        />
        <RightPanel
          combatants={combatants}
          activeIdx={activeIdx}
          tweaks={tweaks}
          aiProvider={tweaks.aiProvider}
          setTweak={setTweak}
        />
      </div>

      {showAddModal && (
        <AddCombatantModal
          onClose={() => { setShowAddModal(false); setAddModalPrefill(null); }}
          onAdd={handleAddCombatant}
          onAddMultiple={handleAddMultiple}
          prefill={addModalPrefill}
          allMonsters={allMonsters}
        />
      )}

      {showInitModal && (
        <InitiativesModal
          combatants={combatants}
          onClose={() => setShowInitModal(false)}
          onApply={handleApplyInitiatives}
        />
      )}

      {showSessionModal && (
        <SessionsModal
          onClose={() => setShowSessionModal(false)}
          encName={encName}
          onSave={handleSaveSession}
          onLoad={handleLoadSession}
        />
      )}

      <window.TweaksPanel>
        <window.TweakSection label="AI Settings" />
        <window.TweakRadio label="AI Provider" value={tweaks.aiProvider}
          options={[{value:'claude',label:'Claude'},{value:'gemini',label:'Gemini'}]}
          onChange={v => setTweak("aiProvider", v)} />
        <window.TweakSection label="Layout" />
        <window.TweakSlider label="Left Panel Width" value={tweaks.leftPanelWidth} min={180} max={320} unit="px"
          onChange={v => setTweak("leftPanelWidth", v)} />
        <window.TweakSlider label="Right Panel Width" value={tweaks.rightPanelWidth} min={220} max={380} unit="px"
          onChange={v => setTweak("rightPanelWidth", v)} />
        <window.TweakSection label="Display" />
        <window.TweakToggle label="Show Round Counter" value={tweaks.showRoundCounter}
          onChange={v => setTweak("showRoundCounter", v)} />
        <window.TweakToggle label="Compact Mode" value={tweaks.compactMode}
          onChange={v => setTweak("compactMode", v)} />
      </window.TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
